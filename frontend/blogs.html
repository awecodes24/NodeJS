<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blogs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Blogs</h1>

    <form id="blogForm">
        <input type="text" placeholder="Title" id="title" required />
        <input type="text" placeholder="Subtitle" id="subtitle" required />
        <textarea placeholder="Description" id="description" required></textarea>
        <button type="submit">Create Blog</button>
    </form>

    <button onclick="fetchBlogs()">Load Blogs</button>

    <ul id="blogList"></ul>

    <script src="script.js"></script>
</body>
</html>
